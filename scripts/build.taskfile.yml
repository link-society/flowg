version: '3'

tasks:
  all:
    desc: "Build all components"
    cmds:
      - task: frontend
      - task: backend

  frontend:
    desc: "Build frontend"
    dir: ./web/app
    cmds:
      - NODE_ENV=dev npm i
      - rm -rf ../public ./dist
      - NODE_ENV=dev npm run build:dev
      - mkdir -p ../public
      - cp -r ./dist/* ../public/

  backend:
    desc: "Build backend"
    vars:
      GOOS:
        sh: go env GOOS
      GOARCH:
        sh: go env GOARCH
      FDB: "{{ .ROOT_DIR }}/third-party/foundationdb/7.3.77"
      RPATH: '{{ if eq .GOOS "darwin" }}@loader_path/../lib{{ else }}$ORIGIN/../lib{{ end }}'

    cmds:
      - task: "backend:vrl"
      - go generate ./...
      - go build -tags debug -ldflags="-s -w" -o bin/ ./cmd/...
      - cmd: install_name_tool -change /usr/local/lib/libfdb_c.dylib @rpath/libfdb_c.dylib bin/flowg-server
        platforms: [darwin]
    env:
      MACOSX_DEPLOYMENT_TARGET: "26.0"
      CGO_ENABLED: "1"
      CGO_CFLAGS: "-I{{ .FDB }}/include"
      CGO_LDFLAGS: "-L{{ .FDB }}/lib/{{ .GOOS }}/{{ .GOARCH }} -Wl,-rpath,{{ .RPATH }}"

  "backend:vrl":
    desc: "Build libvrl Rust crate"
    dir: ./internal/utils/langs/vrl/rust-crate
    cmds:
      - cargo build --release
    env:
      MACOSX_DEPLOYMENT_TARGET: "26.0"
