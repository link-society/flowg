version: '3'

tasks:
  build:
    desc: "Build the docker image"
    cmds:
      - docker build -t linksociety/flowg:localdev -f docker/flowg.dockerfile .

  run:
    desc: "Run the docker image"
    cmds:
      - docker run --rm -v ./data:/data -p 5080:5080/tcp -p 5514:5514/udp linksociety/flowg:localdev serve

  dev:
    desc: "Run the docker stack dev environment"
    cmds:
      - docker-compose -p flowg -f docker/docker-compose.dev.yml up --build
