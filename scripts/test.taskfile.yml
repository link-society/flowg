version: '3'

tasks:
  unit:
    desc: "Run unit tests"
    cmds:
      - task: "test:unit:go"
      - task: "test:unit:rust:vrl"

  "e2e:api":
    desc: "Run API end-to-end tests"
    dir: ./tests
    cmds:
      - pdm install
      - pdm run pytest
    env:
      FLOWG_TEST_SUITES: api
      FLOWG_TEST_DOCKER_IMAGE_NAME: linksociety/flowg:localdev

  "e2e:web":
    desc: "Run Web end-to-end tests"
    dir: ./tests
    cmds:
      - sudo apt install libasound2t64  # required for Firefox webdriver
      - pdm install
      - pdm run pytest
    env:
      FLOWG_TEST_SUITES: web
      FLOWG_TEST_DOCKER_IMAGE_NAME: linksociety/flowg:localdev

  "e2e:consul":
    desc: "Run Consul end-to-end tests"
    dir: ./tests
    cmds:
      - pdm install
      - pdm run pytest
    env:
      FLOWG_TEST_SUITES: consul
      FLOWG_TEST_DOCKER_IMAGE_NAME: linksociety/flowg:localdev

  "e2e:dns:build":
    desc: "Build the docker images used for testing"
    cmds:
      - docker build -t linksociety/flowg-dns:localdev -f tests/config/dns/flowg-dns.dockerfile .
      - docker build -t linksociety/dns:localdev -f tests/config/dns/dns.dockerfile .

  "e2e:dns":
    desc: "Run DNS end-to-end tests"
    dir: ./tests
    cmds:
      - task: e2e:dns:build
      - pdm install
      - pdm run pytest
    env:
      FLOWG_TEST_SUITES: dns
      FLOWG_TEST_DOCKER_IMAGE_NAME: linksociety/flowg:localdev
      FLOWG_TEST_DOCKER_FLOWG_DNS_IMAGE_NAME: linksociety/flowg-dns:localdev
      FLOWG_TEST_DOCKER_DNS_IMAGE_NAME: linksociety/dns:localdev

  bench:
    desc: "Run benchmark"
    dir: ./tests
    cmds:
      - pdm install
      - pdm run pytest
    env:
      FLOWG_TEST_SUITES: bench
      FLOWG_TEST_DOCKER_IMAGE_NAME: linksociety/flowg:localdev

  "test:unit:go":
    internal: true
    cmds:
      - go test -timeout 500ms -v -bench=. ./...

  "test:unit:rust:vrl":
    internal: true
    dir: ./internal/utils/langs/vrl/rust-crate
    cmds:
      - cargo test
