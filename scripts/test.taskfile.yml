version: '3'

tasks:
  unit:
    desc: "Run unit tests"
    cmds:
      - task: "test:unit:rust:vrl"
      - task: "test:unit:go"
    env:
      MACOSX_DEPLOYMENT_TARGET: "26.0"

  "e2e:api":
    desc: "Run API end-to-end tests"
    dir: ./tests
    cmds:
      - pdm install
      - pdm run pytest
    env:
      FLOWG_TEST_SUITES: api
      FLOWG_TEST_DOCKER_IMAGE_NAME: linksociety/flowg:localdev
      FLOCI_AWS_TEST_DOCKER_IMAGE_NAME: floci/floci:latest
      FLOCI_GCP_TEST_DOCKER_IMAGE_NAME: floci/floci-gcp:latest

  "e2e:web":
    desc: "Run Web end-to-end tests"
    dir: ./tests
    cmds:
      - sudo apt install libasound2t64  # required for Firefox webdriver
      - pdm install
      - pdm run pytest
    env:
      FLOWG_TEST_SUITES: web
      FLOWG_TEST_DOCKER_IMAGE_NAME: linksociety/flowg:localdev

  bench:
    desc: "Run benchmark"
    dir: ./tests
    cmds:
      - pdm install
      - pdm run pytest
    env:
      FLOWG_TEST_SUITES: bench
      FLOWG_TEST_DOCKER_IMAGE_NAME: linksociety/flowg:localdev

  "e2e:cluster":
    desc: "Run Cluster end-to-end tests"
    dir: ./tests
    cmds:
      - pdm install
      - pdm run pytest
    env:
      FLOWG_TEST_SUITES: cluster
      FLOWG_TEST_DOCKER_IMAGE_NAME: linksociety/flowg:localdev

  "test:unit:go":
    internal: true
    vars:
      GOOS:
        sh: go env GOOS
      GOARCH:
        sh: go env GOARCH
      FDB: "{{ .ROOT_DIR }}/third-party/foundationdb/7.3.77"
      RPATH: '{{ if eq .GOOS "darwin" }}@loader_path/../lib{{ else }}$ORIGIN/../lib{{ end }}'
    cmds:
      - go test -timeout 500ms -v -bench=. ./...
    env:
      CGO_ENABLED: "1"
      CGO_CFLAGS: "-I{{ .FDB }}/include"
      CGO_LDFLAGS: "-L{{ .FDB }}/lib/{{ .GOOS }}/{{ .GOARCH }} -Wl,-rpath,{{ .RPATH }}"

  "test:unit:rust:vrl":
    internal: true
    dir: ./internal/utils/langs/vrl/rust-crate
    cmds:
      - cargo test
