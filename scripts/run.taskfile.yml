version: '3'

vars:
  GOARCH:
    sh: go env GOARCH
  FDB: "{{ .ROOT_DIR }}/third-party/foundationdb/7.3.77"

tasks:
  demo:
    desc: "Run the project in demo mode"
    cmds:
      - mkdir -p ./data/host/demo
      - ./bin/flowg-server
    env:
      LD_LIBRARY_PATH: "{{ .FDB }}/lib/{{ .GOARCH }}"
      FLOWG_DEMO_MODE: "true"
      FLOWG_SECRET_KEY: "s3cr3!"
      FLOWG_BADGER_AUTH_DIR: "./data/host/demo/auth"
      FLOWG_BADGER_CONFIG_DIR: "./data/host/demo/config"
      FLOWG_BADGER_LOG_DIR: "./data/host/demo/logs"

  singlenode:
    desc: "Run the project"
    cmds:
      - mkdir -p ./data/host/singlenode
      - ./bin/flowg-server
    env:
      LD_LIBRARY_PATH: "{{ .FDB }}/lib/{{ .GOARCH }}"
      FLOWG_SECRET_KEY: "s3cr3!"
      FLOWG_BADGER_AUTH_DIR: "./data/host/singlenode/auth"
      FLOWG_BADGER_CONFIG_DIR: "./data/host/singlenode/config"
      FLOWG_BADGER_LOG_DIR: "./data/host/singlenode/logs"
