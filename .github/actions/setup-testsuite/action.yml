---
name: Setup FlowG test suite
description: Installs PDM, Hurl and project dependencies
inputs:
  ref:
    description: Git reference (commit, branch or tag)
    required: true
runs:
  using: composite
  steps:
    - name: setup@pdm
      uses: pdm-project/setup-pdm@94a823180e06fcde4ad29308721954a521c96ed0
      with:
        python-version: '3.13'

    - name: setup@sys-deps
      uses: gacts/install-hurl@ab6d0234456944b022ef7d1f594845af9561357d # v1.3.4
      with:
        version: '7.1.0'
        github-token: ${{ github.token }}

    - name: setup@env
      shell: bash
      working-directory: ./tests
      run: pdm install

    - name: download@image
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: docker-image-${{ inputs.ref }}-linux-amd64

    - name: load@image
      shell: bash
      run: docker load -i image.tar
