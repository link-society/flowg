---
name: Run FlowG Kubernetes test suite
description: Run the test-suite and send reports

inputs:
  ref:
    description: Git reference (commit, branch or tag)
    required: true
  pr:
    description: Pull Request ID
    required: false
  checkname:
    description: Name of the check
    required: true

runs:
  using: composite
  steps:
    - name: load@k8s
      shell: bash
      run: kind load docker-image ${DOCKER_IMAGE} --name flowg
      env:
        DOCKER_IMAGE: ghcr.io/link-society/flowg/ci-artifacts/docker:${{ inputs.ref }}-linux-amd64

    - name: lint@helm
      shell: bash
      run: ct lint --chart-dirs ./k8s/charts --charts ./k8s/charts/flowg --validate-maintainers=false

    - name: test@helm
      shell: bash
      run: |
        set -ex
        kubectl get ns flowg-system || kubectl create ns flowg-system
        ct install \
          --chart-dirs ./k8s/charts \
          --charts ./k8s/charts/flowg \
          --namespace flowg-system \
          --helm-extra-set-args "--set=flowg.image.repository=${DOCKER_IMAGE_REPOSITORY} --set=flowg.image.tag=${DOCKER_IMAGE_TAG} --set=flowg.image.pullPolicy=Never --wait"
      env:
        DOCKER_IMAGE_REPOSITORY: ghcr.io/link-society/flowg/ci-artifacts/docker
        DOCKER_IMAGE_TAG: ${{ inputs.ref }}-linux-amd64

    - name: write@metadata
      if: ${{ !cancelled() }}
      shell: bash
      env:
        META_SHA: ${{ inputs.ref }}
        META_PR: ${{ inputs.pr }}
        META_CHECKNAME: ${{ inputs.checkname }}
      run: |
        mkdir -p ./tests/reports/k8s
        echo -n "${META_SHA}" > ./tests/reports/k8s/meta.sha
        echo -n "${META_PR}" > ./tests/reports/k8s/meta.pr
        echo -n "${META_CHECKNAME}" > ./tests/reports/k8s/meta.checkname

    - name: write-success@outcome
      if: ${{ success() }}
      shell: bash
      run: echo -n "success" > ./tests/reports/k8s/meta.outcome

    - name: write-failure@outcome
      if: ${{ failure() }}
      shell: bash
      run: echo -n "failure" > ./tests/reports/k8s/meta.outcome

    - name: upload@artifact
      if: ${{ !cancelled() }}
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: e2e-report-k8s
        path: "./tests/reports/k8s/"
        retention-days: 1

    - name: report@fail
      if: ${{ failure() }}
      shell: bash
      run: exit 1
