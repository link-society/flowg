---
name: Run FlowG Hurl test suite
description: Run the test-suite and send reports

inputs:
  ref:
    description: Git reference (commit, branch or tag)
    required: true
  pr:
    description: Pull Request ID
    required: false
  testsuite:
    description: Test suite to run (api, cluster, web, k8s)
    required: true
  checkname:
    description: Name of the check
    required: true

runs:
  using: composite
  steps:
    - name: run@test
      shell: bash
      working-directory: ./tests
      run: pdm run pytest
      env:
        FLOWG_TEST_SUITES: ${{ inputs.testsuite }}
        FLOWG_TEST_DOCKER_IMAGE_NAME: ghcr.io/link-society/flowg/ci-artifacts/docker:${{ inputs.ref }}-linux-amd64

    - name: write@metadata
      if: ${{ !cancelled() }}
      shell: bash
      env:
        META_SHA: ${{ inputs.ref }}
        META_PR: ${{ inputs.pr }}
        META_CHECKNAME: ${{ inputs.checkname }}
      run: |
        mkdir -p ./tests/reports/${{ inputs.testsuite }}
        echo -n "${META_SHA}" > ./tests/reports/${{ inputs.testsuite }}/meta.sha
        echo -n "${META_PR}" > ./tests/reports/${{ inputs.testsuite }}/meta.pr
        echo -n "${META_CHECKNAME}" > ./tests/reports/${{ inputs.testsuite }}/meta.checkname

    - name: write-success@outcome
      if: ${{ success() }}
      shell: bash
      run: echo -n "success" > ./tests/reports/${{ inputs.testsuite }}/meta.outcome

    - name: write-failure@outcome
      if: ${{ failure() }}
      shell: bash
      run: echo -n "failure" > ./tests/reports/${{ inputs.testsuite }}/meta.outcome

    - name: upload@artifact
      if: ${{ !cancelled() }}
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: e2e-report-${{ inputs.testsuite }}
        path: "./tests/reports/${{ inputs.testsuite }}/"
        retention-days: 1

    - name: report@fail
      if: ${{ failure() }}
      shell: bash
      run: exit 1
