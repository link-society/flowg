---
name: Run FlowG Hurl test suite
description: Run the test-suite and send reports

inputs:
  ref:
    description: Git reference (commit, branch or tag)
    required: true
  pr:
    description: Pull Request ID
    required: false
  ghtoken:
    description: GitHub Token
    required: true
  testsuite:
    description: Test suite to run (api, web, k8s)
    required: true
  checkname:
    description: Name of the check
    required: true

runs:
  using: composite
  steps:
    - name: run@test
      shell: bash
      working-directory: ./tests
      run: pdm run pytest
      env:
        FLOWG_TEST_SUITES: ${{ inputs.testsuite }}
        FLOWG_TEST_DOCKER_IMAGE_NAME: ghcr.io/link-society/flowg/ci-artifacts/docker:${{ inputs.ref }}-linux-amd64

    - name: report-success@status
      uses: guibranco/github-status-action-v2@77639353504055053524efa7a3719aaf0b731ce9 # v1.2.4
      if: ${{ success() }}
      with:
        authToken: ${{ inputs.ghtoken }}
        context: ${{ inputs.checkname }}
        description: 'Passed'
        state: 'success'
        sha: ${{ inputs.ref }}

    - name: report-failure@status
      uses: guibranco/github-status-action-v2@77639353504055053524efa7a3719aaf0b731ce9 # v1.2.4
      if: ${{ failure() }}
      with:
        authToken: ${{ inputs.ghtoken }}
        context: ${{ inputs.checkname }}
        description: 'Failure'
        state: 'failure'
        sha: ${{ inputs.ref }}

    - name: upload-logs@artifact
      if: ${{ failure() }}
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: ${{ inputs.testsuite }}-e2e-reports
        path: "./tests/reports/${{ inputs.testsuite }}/"
        retention-days: 1

    - name: report@test
      uses: mikepenz/action-junit-report@d9f48fc87bc235f7e214acf696ca5abc0a986f16 # v6.4.2
      if: ${{ success() || failure() }}
      with:
        report_paths: "./tests/reports/${{ inputs.testsuite }}/junit.xml"
        include_passed: true
        check_name: "${{ inputs.checkname }}"
        job_summary: true
        comment: ${{ inputs.pr != '' }}
        updateComment: ${{ inputs.pr != '' }}
        fail_on_failure: true
        commit: ${{ inputs.ref }}
        pr_id: ${{ inputs.pr }}
