---
name: ci-report

on:
  workflow_run:
    workflows:
      - ci-pr-app
      - ci-main
    types:
      - completed

permissions:
  actions: read
  checks: write
  statuses: write
  pull-requests: write
  contents: read

jobs:
  report:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        suite:
          - api
          - web
          - k8s

    steps:
      - name: download@artifact
        id: download
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: e2e-report-${{ matrix.suite }}
          path: ./report
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}

      - name: read@metadata
        id: meta
        if: ${{ steps.download.outcome == 'success' }}
        shell: bash
        run: |
          {
            echo "sha=$(cat ./report/meta.sha)"
            echo "pr=$(cat ./report/meta.pr)"
            echo "checkname=$(cat ./report/meta.checkname)"
            echo "outcome=$(cat ./report/meta.outcome)"
          } >> "$GITHUB_OUTPUT"

      - name: report@junit
        if: ${{ steps.download.outcome == 'success' && matrix.suite == 'api' }}
        uses: mikepenz/action-junit-report@d9f48fc87bc235f7e214acf696ca5abc0a986f16 # v6.4.2
        with:
          report_paths: "./report/junit.xml"
          include_passed: true
          check_name: ${{ steps.meta.outputs.checkname }}
          job_summary: true
          comment: ${{ steps.meta.outputs.pr != '' }}
          updateComment: ${{ steps.meta.outputs.pr != '' }}
          fail_on_failure: false
          commit: ${{ steps.meta.outputs.sha }}
          pr_id: ${{ steps.meta.outputs.pr }}

      - name: report@robot
        if: ${{ steps.download.outcome == 'success' && matrix.suite == 'web' && steps.meta.outputs.pr != '' }}
        uses: joonvena/robotframework-reporter-action@229b6d4248b20be6e54f4fc32c7414130d1bf200
        with:
          gh_access_token: ${{ github.token }}
          report_path: "./report"
          sha: ${{ steps.meta.outputs.sha }}
          pull_request_id: ${{ steps.meta.outputs.pr }}

      - name: report-success@status
        if: ${{ steps.download.outcome == 'success' && steps.meta.outputs.outcome == 'success' }}
        uses: guibranco/github-status-action-v2@77639353504055053524efa7a3719aaf0b731ce9 # v1.2.4
        with:
          authToken: ${{ github.token }}
          context: ${{ steps.meta.outputs.checkname }}
          description: 'Passed'
          state: 'success'
          sha: ${{ steps.meta.outputs.sha }}

      - name: report-failure@status
        if: ${{ steps.download.outcome == 'success' && steps.meta.outputs.outcome == 'failure' }}
        uses: guibranco/github-status-action-v2@77639353504055053524efa7a3719aaf0b731ce9 # v1.2.4
        with:
          authToken: ${{ github.token }}
          context: ${{ steps.meta.outputs.checkname }}
          description: 'Failure'
          state: 'failure'
          sha: ${{ steps.meta.outputs.sha }}
