---
name: build-docker

on:
  workflow_call:
    inputs:
      ref:
        required: true
        type: string
      gh-runner:
        required: false
        type: string
        default: ubuntu-latest
      arch:
        required: false
        type: string
        default: amd64
      os:
        required: false
        type: string
        default: linux

env:
  ARTIFACT_ID: ${{ inputs.ref }}-${{ inputs.os }}-${{ inputs.arch }}
  ARTIFACT_BASENAME: ghcr.io/link-society/flowg/ci-artifacts

jobs:
  build:
    runs-on: ${{ inputs.gh-runner }}

    steps:
      - name: cache@image
        id: cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: image.tar
          key: docker-image-${{ env.ARTIFACT_ID }}

      - name: checkout@scm
        if: steps.cache.outputs.cache-hit != 'true'
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          ref: ${{ inputs.ref }}

      - name: setup@docker
        if: steps.cache.outputs.cache-hit != 'true'
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c

      - name: build@docker
        if: steps.cache.outputs.cache-hit != 'true'
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a
        with:
          context: .
          file: ./docker/flowg.dockerfile
          build-args: |
            UPX_OS=${{ inputs.os }}
          tags: ${{ env.ARTIFACT_BASENAME }}/docker:${{ env.ARTIFACT_ID }}
          push: false
          load: true
          cache-from: type=gha,scope=flowg-${{ inputs.os }}-${{ inputs.arch }}
          cache-to: type=gha,mode=max,scope=flowg-${{ inputs.os }}-${{ inputs.arch }}

      - name: save@image
        if: steps.cache.outputs.cache-hit != 'true'
        run: docker save "${ARTIFACT_BASENAME}/docker:${ARTIFACT_ID}" -o image.tar

      - name: upload@artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: docker-image-${{ env.ARTIFACT_ID }}
          path: image.tar
          retention-days: 1
          compression-level: 0
