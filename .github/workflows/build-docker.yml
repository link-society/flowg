---
name: build-docker

on:
  workflow_call:
    inputs:
      ref:
        required: true
        type: string
      gh-runner:
        required: false
        type: string
        default: ubuntu-latest
      arch:
        required: false
        type: string
        default: amd64
      os:
        required: false
        type: string
        default: linux

env:
  ARTIFACT_ID: ${{ inputs.ref }}-${{ inputs.os }}-${{ inputs.arch }}
  ARTIFACT_BASENAME: ghcr.io/link-society/flowg/ci-artifacts

jobs:
  build:
    runs-on: ${{ inputs.gh-runner }}

    steps:
      - name: cache@image
        id: cache
        uses: actions/cache@6849a6489940f00c2f30c0fb92c6274307ccb58a
        with:
          path: image.tar
          key: docker-image-${{ env.ARTIFACT_ID }}

      - name: checkout@scm
        if: steps.cache.outputs.cache-hit != 'true'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ inputs.ref }}

      - name: setup@docker
        if: steps.cache.outputs.cache-hit != 'true'
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5

      - name: build@docker
        if: steps.cache.outputs.cache-hit != 'true'
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf
        with:
          context: .
          file: ./docker/flowg.dockerfile
          build-args: |
            UPX_ARCH=${{ inputs.arch }}
            UPX_OS=${{ inputs.os }}
          tags: ${{ env.ARTIFACT_BASENAME }}/docker:${{ env.ARTIFACT_ID }}
          push: false
          load: true
          cache-from: type=gha,scope=flowg-${{ inputs.os }}-${{ inputs.arch }}
          cache-to: type=gha,mode=max,scope=flowg-${{ inputs.os }}-${{ inputs.arch }}

      - name: save@image
        if: steps.cache.outputs.cache-hit != 'true'
        run: docker save "${ARTIFACT_BASENAME}/docker:${ARTIFACT_ID}" -o image.tar

      - name: upload@artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f
        with:
          name: docker-image-${{ env.ARTIFACT_ID }}
          path: image.tar
          retention-days: 1
          compression-level: 0
