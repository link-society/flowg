---
name: test-e2e

on:
  workflow_call:
    inputs:
      ref:
        required: true
        type: string
      pr:
        required: false
        type: string

jobs:
  api:
    runs-on: ubuntu-latest
    permissions:
      packages: read
      contents: write
      checks: write
      pull-requests: write
      statuses: write

    steps:
      - name: checkout@scm
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: "${{ inputs.ref }}"

      - name: setup@testsuite
        uses: ./.github/actions/setup-testsuite
        with:
          ref: ${{ inputs.ref }}
          ghactor: ${{ github.actor }}
          ghtoken: ${{ secrets.GITHUB_TOKEN }}

      - name: run@testsuite
        uses: ./.github/actions/run-hurl-testsuite
        with:
          ref: ${{ inputs.ref }}
          pr: ${{ inputs.pr }}
          ghtoken: ${{ secrets.GITHUB_TOKEN }}
          testsuite: api
          checkname: "API End-To-End Test Report"

  web:
    runs-on: ubuntu-latest
    permissions:
      packages: read
      contents: write
      checks: write
      pull-requests: write
      statuses: write

    steps:
      - name: checkout@scm
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: "${{ inputs.ref }}"

      - name: setup@testsuite
        uses: ./.github/actions/setup-testsuite
        with:
          ref: ${{ inputs.ref }}
          ghactor: ${{ github.actor }}
          ghtoken: ${{ secrets.GITHUB_TOKEN }}

      - name: run@testsuite
        uses: ./.github/actions/run-robotframework-testsuite
        with:
          ref: ${{ inputs.ref }}
          pr: ${{ inputs.pr }}
          ghtoken: ${{ secrets.GITHUB_TOKEN }}
          testsuite: web
          checkname: "Web End-To-End Test Report"

  consul:
    runs-on: ubuntu-latest
    permissions:
      packages: read
      contents: write
      checks: write
      pull-requests: write
      statuses: write

    steps:
      - name: checkout@scm
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: "${{ inputs.ref }}"

      - name: setup@testsuite
        uses: ./.github/actions/setup-testsuite
        with:
          ref: ${{ inputs.ref }}
          ghactor: ${{ github.actor }}
          ghtoken: ${{ secrets.GITHUB_TOKEN }}

      - name: run@testsuite
        uses: ./.github/actions/run-hurl-testsuite
        with:
          ref: ${{ inputs.ref }}
          pr: ${{ inputs.pr }}
          ghtoken: ${{ secrets.GITHUB_TOKEN }}
          testsuite: consul
          checkname: "Consul End-To-End Test Report"

  dns:
    runs-on: ubuntu-latest
    permissions:
      packages: read
      contents: write
      checks: write
      pull-requests: write
      statuses: write

    env:
      ARTIFACT_ID: ${{ inputs.ref }}-linux-amd64
      FLOWG_TEST_DOCKER_DNS_IMAGE_NAME: ghcr.io/link-society/flowg/tests/dns/docker:${ARTIFACT_ID}
      FLOWG_TEST_DOCKER_FLOWG_DNS_IMAGE_NAME: ghcr.io/link-society/flowg/tests/flowg-dns/docker:${ARTIFACT_ID}

    steps:
      - name: checkout@scm
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: "${{ inputs.ref }}"

      - name: setup@testsuite
        uses: ./.github/actions/setup-testsuite
        with:
          ref: ${{ inputs.ref }}
          ghactor: ${{ github.actor }}
          ghtoken: ${{ secrets.GITHUB_TOKEN }}

      - name: setup@docker
        if: steps.need-docker.outputs.exists == 'false'
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd

      - name: build-dns@docker
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294
        with:
          context: .
          file: ./tests/config/dns/dns.dockerfile
          tags: ${{ env.FLOWG_TEST_DOCKER_DNS_IMAGE_NAME }}
          push: true
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: build-flowg-dns@docker
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294
        with:
          context: .
          file: ./tests/config/dns/flowg-dns.dockerfile
          tags: ${{ env.FLOWG_TEST_DOCKER_FLOWG_DNS_IMAGE_NAME }}
          push: true
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: download-dns@artifacts
        shell: bash
        run: |
          docker pull ${{ env.FLOWG_TEST_DOCKER_DNS_IMAGE_NAME }}
          docker pull ${{ env.FLOWG_TEST_DOCKER_FLOWG_DNS_IMAGE_NAME }}

      - name: run@testsuite
        uses: ./.github/actions/run-hurl-testsuite
        with:
          ref: ${{ inputs.ref }}
          pr: ${{ inputs.pr }}
          ghtoken: ${{ secrets.GITHUB_TOKEN }}
          testsuite: dns
          checkname: "DNS End-To-End Test Report"

  k8s:
    runs-on: ubuntu-latest
    permissions:
      packages: read
      contents: write
      checks: write
      pull-requests: write
      statuses: write

    steps:
      - name: checkout@scm
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: "${{ inputs.ref }}"

      - name: setup@testsuite
        uses: ./.github/actions/setup-testsuite
        with:
          ref: ${{ inputs.ref }}
          ghactor: ${{ github.actor }}
          ghtoken: ${{ secrets.GITHUB_TOKEN }}

      - name: setup@k8s
        uses: ./.github/actions/setup-k8s

      - name: run@testsuite
        uses: ./.github/actions/run-k8s-testsuite
        with:
          ref: ${{ inputs.ref }}
          pr: ${{ inputs.pr }}
          ghtoken: ${{ secrets.GITHUB_TOKEN }}
          checkname: "Kubernetes End-To-End Test Report"
