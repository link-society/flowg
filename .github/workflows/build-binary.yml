---
name: build-binary

on:
  workflow_call:
    inputs:
      ref:
        required: true
        type: string
      gh-runner:
        required: false
        type: string
        default: ubuntu-latest
      rust-target:
        required: false
        type: string
        default: x86_64-unknown-linux-gnu
      goos:
        required: false
        type: string
        default: linux
      goarch:
        required: false
        type: string
        default: amd64

env:
  ARTIFACT_ID: ${{ inputs.ref }}-${{ inputs.goos }}-${{ inputs.goarch }}
  ARTIFACT_BASENAME: ghcr.io/link-society/flowg/ci-artifacts

jobs:
  build:
    runs-on: ${{ inputs.gh-runner }}

    steps:
      - name: checkout@scm
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ inputs.ref }}

      - name: cache@build
        id: cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          key: binaries-${{ env.ARTIFACT_ID }}
          path: |
            bin
            lib
            website/docs/technical/cli
            website/src/openapi.json

      - name: setup@buildchain
        if: steps.cache.outputs.cache-hit != 'true'
        uses: ./.github/actions/setup-buildchain
        with:
          ghtoken: ${{ secrets.GITHUB_TOKEN }}
          rstarget: ${{ inputs.rust-target }}

      - name: build@binary
        if: steps.cache.outputs.cache-hit != 'true'
        run: task build:all doc:gen:cli doc:gen:openapi
        env:
          GOOS: ${{ inputs.goos }}
          GOARCH: ${{ inputs.goarch }}
          NODE_ENV: "production"
          MACOSX_DEPLOYMENT_TARGET: "26.0"

      - name: bundle-fdb-lib@binary
        if: steps.cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          mkdir -p lib
          if [ "${{ inputs.goos }}" = "darwin" ]; then
            cp "third-party/foundationdb/7.3.77/lib/${{ inputs.goos }}/${{ inputs.goarch }}/libfdb_c.dylib" lib/libfdb_c.dylib
          else
            cp "third-party/foundationdb/7.3.77/lib/${{ inputs.goos }}/${{ inputs.goarch }}/libfdb_c.so" lib/libfdb_c.so
          fi

      - name: compress@binary
        if: inputs.goos != 'darwin' && steps.cache.outputs.cache-hit != 'true'
        uses: crazy-max/ghaction-upx@c83f378efc804f828e988debb88ed6116feb2368
        with:
          files: bin/*

      - name: upload-binaries@artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: binaries-${{ env.ARTIFACT_ID }}
          path: |
            bin
            lib
            LICENSE.txt
          retention-days: 1

      - name: upload-doc-cli@artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: doc-cli-${{ env.ARTIFACT_ID }}
          path: website/docs/technical/cli
          retention-days: 1

      - name: upload-doc-openapi@artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: doc-openapi-${{ env.ARTIFACT_ID }}
          path: website/src/openapi.json
          retention-days: 1
