---
name: release-binary

on:
  workflow_call:
    inputs:
      ref:
        required: true
        type: string
      version:
        required: true
        type: string
      goos:
        required: false
        type: string
        default: linux
      goarch:
        required: false
        type: string
        default: amd64

env:
  ARTIFACT_ID: ${{ inputs.ref }}-${{ inputs.goos }}-${{ inputs.goarch }}

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: download@artifact
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16
        with:
          name: binaries-${{ env.ARTIFACT_ID }}

      - name: upload@assets
        run: |
          tar -czf ${ARCHIVE_NAME} bin/ LICENSE.txt
          gh release upload ${RELEASE_NAME} ${ARCHIVE_NAME} --repo ${{ github.repository }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ARCHIVE_NAME: flowg-${{ inputs.version }}-${{ inputs.goos }}-${{ inputs.goarch }}.tar.gz
          RELEASE_NAME: ${{ inputs.version }}
