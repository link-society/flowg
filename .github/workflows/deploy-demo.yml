---
name: deploy-demo

on:
  workflow_call:
    inputs:
      ref:
        required: true
        type: string
      version:
        required: true
        type: string
        default: "latest"
    secrets:
      RENDER_API_KEY:
        required: true
      RENDER_SERVICE_ID:
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    environment:
      name: demo
      url: https://demo.flowg.cloud

    steps:
      - name: checkout@scm
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          ref: ${{ inputs.ref }}

      - name: deploy@render
        uses: ./.github/actions/render-deploy
        with:
          render_api_key: ${{ secrets.RENDER_API_KEY }}
          render_service_id: ${{ secrets.RENDER_SERVICE_ID }}
          docker_image_name: "docker.io/linksociety/flowg:${{ inputs.version }}"
